<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Go Gas ERP</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Poppins',sans-serif;
        }

        body{
            background:#f4f7fc;
            overflow-x:hidden;
        }

        .sidebar{
            width:260px;
            height:100vh;
            position:fixed;
            background:linear-gradient(180deg,#0f172a,#1e293b);
            padding-top:20px;
            box-shadow:0 0 20px rgba(0,0,0,0.2);
        }

        .logo{
            color:white;
            font-size:28px;
            font-weight:700;
            text-align:center;
            margin-bottom:35px;
        }

        .logo span{
            color:#ff9800;
        }

        .menu{
            padding:0 15px;
        }

        .menu a{
            display:flex;
            align-items:center;
            gap:14px;
            color:#dbeafe;
            text-decoration:none;
            padding:14px 18px;
            border-radius:14px;
            margin-bottom:10px;
            transition:0.3s;
            font-size:15px;
            font-weight:500;
        }

        .menu a:hover{
            background:rgba(255,255,255,0.1);
            transform:translateX(5px);
            color:white;
        }

        .menu a i{
            font-size:18px;
        }

        .main{
            margin-left:260px;
            padding:25px;
        }

        .topbar{
            background:white;
            border-radius:18px;
            padding:18px 25px;
            display:flex;
            justify-content:space-between;
            align-items:center;
            box-shadow:0 5px 20px rgba(0,0,0,0.05);
            margin-bottom:25px;
        }

        .search-box{
            width:350px;
            position:relative;
        }

        .search-box input{
            width:100%;
            border:none;
            background:#f1f5f9;
            padding:12px 18px;
            border-radius:12px;
            outline:none;
        }

        .profile{
            display:flex;
            align-items:center;
            gap:15px;
        }

        .profile img{
            width:45px;
            height:45px;
            border-radius:50%;
            object-fit:cover;
        }

        .cards{
            display:grid;
            grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
            gap:20px;
            margin-bottom:30px;
        }

        .card-box{
            padding:25px;
            border-radius:22px;
            color:white;
            position:relative;
            overflow:hidden;
            transition:0.3s;
        }

        .card-box:hover{
            transform:translateY(-5px);
        }

        .card-box h5{
            font-size:15px;
            opacity:0.9;
        }

        .card-box h2{
            margin-top:10px;
            font-size:34px;
            font-weight:700;
        }

        .card-box i{
            position:absolute;
            right:20px;
            bottom:20px;
            font-size:55px;
            opacity:0.2;
        }

        .gradient1{
            background:linear-gradient(135deg,#667eea,#764ba2);
        }

        .gradient2{
            background:linear-gradient(135deg,#ff9966,#ff5e62);
        }

        .gradient3{
            background:linear-gradient(135deg,#11998e,#38ef7d);
        }

        .gradient4{
            background:linear-gradient(135deg,#fc4a1a,#f7b733);
        }

        .table-box{
            background:white;
            border-radius:20px;
            padding:25px;
            box-shadow:0 5px 20px rgba(0,0,0,0.05);
        }

        .table-box h4{
            margin-bottom:20px;
            font-weight:600;
        }

        table{
            width:100%;
        }

        table th{
            background:#f8fafc;
            padding:14px;
            font-size:14px;
        }

        table td{
            padding:14px;
            font-size:14px;
        }

        .badge-status{
            background:#dcfce7;
            color:#166534;
            padding:6px 12px;
            border-radius:30px;
            font-size:12px;
            font-weight:600;
        }

        @media(max-width:991px){

            .sidebar{
                width:80px;
            }

            .sidebar .logo{
                font-size:18px;
            }

            .menu a span{
                display:none;
            }

            .main{
                margin-left:80px;
            }

        }

    </style>

</head>

<body>

<div class="sidebar">

    <div class="logo">
        Go<span>Gas</span>
    </div>

    <div class="menu">

        <a href="/">
            <i class="fa-solid fa-chart-line"></i>
            <span>Dashboard</span>
        </a>

        <a href="/customers">
            <i class="fa-solid fa-users"></i>
            <span>Customers</span>
        </a>

        <a href="/bookings">
            <i class="fa-solid fa-gas-pump"></i>
            <span>Bookings</span>
        </a>

        <a href="/delivery">
            <i class="fa-solid fa-truck"></i>
            <span>Delivery</span>
        </a>

    </div>

</div>

<div class="main">

    <div class="topbar">

        <div class="search-box">
            <input type="text" placeholder="Search customer, booking...">
        </div>

        <div class="profile">

            <i class="fa-solid fa-bell fa-lg"></i>

            <img src="https://i.pravatar.cc/100">

        </div>

    </div>

    {% block content %}
    {% endblock %}

</div>

</body>
</html>
