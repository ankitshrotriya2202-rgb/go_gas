{% extends 'base.html' %}

{% block content %}

<div class="container mt-5">

    <div class="table-box p-4">

        <h2 class="mb-4">
            Deliver Booking
        </h2>

        <form method="POST">

            <div class="mb-4">

                <label class="mb-2">
                    Payment Mode
                </label>

                <select name="payment_mode"
                        class="form-control form-control-lg"
                        required>

                    <option value="">
                        Select Payment Mode
                    </option>

                    <option value="Cash">
                        Cash
                    </option>

                    <option value="UPI">
                        UPI
                    </option>

                    <option value="Bank Transfer">
                        Bank Transfer
                    </option>

                </select>

            </div>

            <div class="mb-4">

                <label class="mb-2">
                    UTR Number
                </label>

                <input type="text"
                       name="utr_no"
                       placeholder="Enter UTR Number"
                       class="form-control form-control-lg">

            </div>

            <button class="btn btn-success btn-lg">

                Complete Delivery

            </button>

        </form>

    </div>

</div>

{% endblock %}
