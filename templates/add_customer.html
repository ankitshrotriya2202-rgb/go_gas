{% extends 'base.html' %}

{% block content %}

<div class="d-flex justify-content-between align-items-center mb-4">

    <div>

        <h2 style="font-weight:700;">
            Add LPG Customer
        </h2>

        <p class="text-muted">
            Create new LPG gas connection
        </p>

    </div>

</div>

<div class="table-box">

<form method="POST">

    <div class="row">

        <!-- Consumer Number -->

        <div class="col-md-4 mb-3">

            <label class="mb-2">
                Consumer Number
            </label>

            <input type="text"
                   value="{{ next_consumer_no }}"
                   class="form-control form-control-lg"
                   readonly>

        </div>

        <!-- Customer Name -->

        <div class="col-md-4 mb-3">

            <label class="mb-2">
                Business Name
            </label>

            <input type="text"
                   name="customer_name"
                   class="form-control form-control-lg"
                   required>

        </div>

        <!-- Father -->

        <div class="col-md-4 mb-3">

            <label class="mb-2">
                Owner Name
            </label>

            <input type="text"
                   name="father_name"
                   class="form-control form-control-lg">

        </div>

        <!-- Address -->

        <div class="col-md-12 mb-3">

            <label class="mb-2">
                Business Address
            </label>

            <textarea
                    name="address"
                    class="form-control form-control-lg"
                    rows="3"></textarea>

        </div>

        <!-- Mobile -->

        <div class="col-md-4 mb-3">

            <label class="mb-2">
                Mobile Number
            </label>

            <input type="text"
                   name="mobile"
                   class="form-control form-control-lg">

        </div>

        <!-- Office Mobile -->

        <div class="col-md-4 mb-3">

            <label class="mb-2">
                Office Mobile Number
            </label>

            <input type="text"
                   name="office_mobile"
                   class="form-control form-control-lg"
                   >

        </div>

        <!-- Email -->

        <div class="col-md-4 mb-3">

            <label class="mb-2">
                Email
            </label>

            <input type="email"
                   name="email"
                   class="form-control form-control-lg"
                  >

        </div>

        <!-- ID Proof -->

        <div class="col-md-4 mb-3">

            <label class="mb-2">
                Proof of Address
            </label>

            <input type="text"
                   name="id_proof"
                   class="form-control form-control-lg">

        </div>

        <!-- PAN -->

        <div class="col-md-4 mb-3">

            <label class="mb-2">
                PAN Number
            </label>

            <input type="text"
                   name="pan_no"
                   class="form-control form-control-lg">

        </div>

        <!-- Receiver -->

       <div class="col-md-3 mb-3">

    <label class="mb-2">
        Regulator Qty
    </label>

    <select name="regulator_qty"
            class="form-control form-control-lg">

        {% for i in range(11) %}
        <option value="{{ i }}">{{ i }}</option>
        {% endfor %}

    </select>

</div>

<div class="col-md-3 mb-3">

    <label class="mb-2">
        Connector Qty
    </label>

    <select name="connector_qty"
            class="form-control form-control-lg">

        {% for i in range(11) %}
        <option value="{{ i }}">{{ i }}</option>
        {% endfor %}

    </select>

</div>




        <!-- Cylinder -->

        <div class="col-md-3 mb-3">

            <label class="mb-2">
                Cylinder Size
            </label>

            <select name="cylinder_type"
                    class="form-control form-control-lg">

				
				<option>19.2 KG</option>

                <option>15 KG</option>

                <option>10 KG</option>
				
				

            </select>

        </div>

        <!-- Qty -->

        <div class="col-md-3 mb-3">

            <label class="mb-2">
                Quantity
            </label>

            <input type="number"
                   name="cylinder_qty"
                   value="1"
                   class="form-control form-control-lg">

        </div>
		
		
		<div class="col-md-3 mb-3">

    <label class="mb-2">
        Rate
    </label>

    <input type="number"
           step="0.01"
           name="rate"
           class="form-control form-control-lg">

</div>

        <!-- Connection -->

        <div class="col-md-3 mb-3">

            <label class="mb-2">
                Connection Type
            </label>

            <select name="connection_type"
                    class="form-control form-control-lg">

                <option>Domestic</option>

                <option>Commercial</option>

            </select>

        </div>
		
		
		<div class="col-md-3 mb-3">

    <label class="mb-2">
        Payment Type
    </label>

    <select name="payment_type"
            class="form-control form-control-lg">

		<option value="Bill to Bill">Bill to Bill</option>

        <option value="Cash">Cash</option>

        <option value="UPI">UPI</option>

        <option value="Bank Transfer">Bank Transfer</option>

        <option value="Cheque">Cheque</option>

    </select>

</div>

        <!-- Regulator -->

        <!-- Regulator / Convertor -->

<div class="col-md-3 mb-3">

    <label class="mb-2">
        Regulator / Convertor
    </label>

    <select name="regulator_no"
            class="form-control form-control-lg">

        <option value="Given">
            Given
        </option>

        <option value="Not Given">
            Not Given
        </option>

    </select>

</div>

        <!-- Stove -->

        <!-- Convertor Details -->

<div class="col-md-6 mb-3">

    <label class="mb-2">
        Convertor / Regulator Details
    </label>

    <input type="text"
           name="stove_details"
           class="form-control form-control-lg">

</div>
        <!-- Pipe -->

        <div class="col-md-6 mb-3">

            <label class="mb-2">
                Connection Issue Date
            </label>

            <input type="date"
                   name="pipe_issue_date"
                   class="form-control form-control-lg">

        </div>
		
		
		<!-- Remarks -->

<div class="col-md-12 mb-3">

    <label class="mb-2">
        Remarks
    </label>

    <textarea
            name="remarks"
            class="form-control form-control-lg"
            rows="3"></textarea>

</div>

<!-- Bill Type -->

<div class="col-md-4 mb-3">

    <label class="mb-2">
        Bill Type
    </label>

    <select name="bill_type"
            class="form-control form-control-lg">

        <option value="Bill To Bill">
            Bill To Bill
        </option>
		
		<option value="Cash">
            Cash
        </option>
		
		<option value="Bank Tranfer">
            Bank Tranfer
        </option>
		
		<option value="Cheque">
            Cheque
        </option>
		
		<option value="UPI">
            UPI
        </option>

    </select>

</div>
		
		<!-- Security Deposit -->

<div class="col-md-4 mb-3">

    <label class="mb-2">
        Security Deposit
    </label>

    <input type="text"
           name="security_deposit"
           class="form-control form-control-lg">

</div>

    </div>

    <button class="btn btn-success btn-lg px-5 mt-3">

        Save Connection

    </button>

</form>

</div>

{% endblock %}
